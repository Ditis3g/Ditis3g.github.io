baseURL = 'https://ditis3g.github.io/'
title = 'Physical AI 드림팀'
theme = 'hugo-theme-stack'
timeZone = 'Asia/Seoul'

defaultContentLanguage = 'ko'
hasCJKLanguage = true

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 10

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = true
    startLevel = 2

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "글 목록"
    url = "/posts/"
    weight = 10
    [menu.main.params]
      icon = "archives"
  [[menu.main]]
    identifier = "categories"
    name = "카테고리"
    url = "/categories/"
    weight = 20
    [menu.main.params]
      icon = "categories"
  [[menu.main]]
    identifier = "tags"
    name = "태그"
    url = "/tags/"
    weight = 30
    [menu.main.params]
      icon = "tag"

[params]
  mainSections = ["posts"]
  featuredImageField = "image"
  rssFullContent = true
  description = "Physical AI를 비롯해 돈 되는 모든 걸 다 하는 드림팀"

  [params.footer]
    since = 2026
    customText = ""

  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02 15:04 MST"

  [params.sidebar]
    emoji = "🤖"
    subtitle = "Physical AI를 비롯해 돈 되는 모든 걸 다 하는 드림팀의 기록"
    avatar = "/img/avatar.png"

  [params.article]
    math = false
    toc = true
    readingTime = true
    [params.article.license]
      enabled = false
      default = ""

  [params.comments]
    enabled = false

  [params.widgets]
    homepage = [
      { type = "search" },
      { type = "archives", params = { limit = 5 } },
      { type = "categories", params = { limit = 10 } },
      { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [
      { type = "toc" },
    ]

  [params.opengraph]
    [params.opengraph.twitter]
      site = ""
      card = "summary_large_image"

  [params.defaultImage]
    [params.defaultImage.opengraph]
      enabled = false
      local = false
      src = ""

  [params.colorScheme]
    toggle = true
    default = "auto"

  [params.imageProcessing]
    [params.imageProcessing.cover]
      enabled = true
    [params.imageProcessing.content]
      enabled = true

[related]
  includeNewer = true
  threshold = 60
  toLower = false

  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 200
