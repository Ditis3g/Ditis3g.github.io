<svg width="100%" viewBox="0 0 680 210" xmlns="http://www.w3.org/2000/svg" role="img">
<title>이미지가 토큰 시퀀스로 변환되는 과정</title>
<desc>입력 이미지를 16x16 패치로 나누고, 각 패치를 펼쳐 선형 투영해 패치 임베딩으로 만든 뒤, 맨 앞에 클래스 토큰을 붙이고 위치 임베딩을 더해 토큰 시퀀스를 만든다.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.lbl{font-family:'Malgun Gothic','Segoe UI',-apple-system,Roboto,sans-serif;font-size:14px;fill:#3d3d3a;}
.lblm{font-family:'Malgun Gothic','Segoe UI',-apple-system,Roboto,sans-serif;font-size:12px;fill:#6f6e69;}
.wt{font-family:'Malgun Gothic','Segoe UI',-apple-system,Roboto,sans-serif;font-size:13px;fill:#ffffff;}
@media (prefers-color-scheme:dark){.lbl{fill:#e8e7e2;}.lblm{fill:#a9a8a2;}}
</style>
</defs>
<text class="lbl" x="97" y="34" text-anchor="middle">입력 이미지</text>
<rect x="50" y="48" width="30" height="30" rx="4" fill="#1D9E75"/><text class="wt" x="65" y="63" text-anchor="middle" dominant-baseline="central">1</text>
<rect x="84" y="48" width="30" height="30" rx="4" fill="#1D9E75"/><text class="wt" x="99" y="63" text-anchor="middle" dominant-baseline="central">2</text>
<rect x="118" y="48" width="30" height="30" rx="4" fill="#1D9E75"/><text class="wt" x="133" y="63" text-anchor="middle" dominant-baseline="central">3</text>
<rect x="50" y="82" width="30" height="30" rx="4" fill="#1D9E75"/><text class="wt" x="65" y="97" text-anchor="middle" dominant-baseline="central">4</text>
<rect x="84" y="82" width="30" height="30" rx="4" fill="#1D9E75"/><text class="wt" x="99" y="97" text-anchor="middle" dominant-baseline="central">5</text>
<rect x="118" y="82" width="30" height="30" rx="4" fill="#1D9E75"/><text class="wt" x="133" y="97" text-anchor="middle" dominant-baseline="central">6</text>
<rect x="50" y="116" width="30" height="30" rx="4" fill="#1D9E75"/><text class="wt" x="65" y="131" text-anchor="middle" dominant-baseline="central">7</text>
<rect x="84" y="116" width="30" height="30" rx="4" fill="#1D9E75"/><text class="wt" x="99" y="131" text-anchor="middle" dominant-baseline="central">8</text>
<rect x="118" y="116" width="30" height="30" rx="4" fill="#1D9E75"/><text class="wt" x="133" y="131" text-anchor="middle" dominant-baseline="central">9</text>
<line x1="153" y1="97" x2="246" y2="97" stroke="#8a8984" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="lblm" x="199" y="88" text-anchor="middle">선형 투영</text>
<rect x="252" y="81" width="28" height="32" rx="4" fill="#D85A30"/><text class="wt" x="266" y="97" text-anchor="middle" dominant-baseline="central">*</text>
<rect x="286" y="81" width="28" height="32" rx="4" fill="#1D9E75"/>
<rect x="320" y="81" width="28" height="32" rx="4" fill="#1D9E75"/>
<rect x="354" y="81" width="28" height="32" rx="4" fill="#1D9E75"/>
<rect x="388" y="81" width="28" height="32" rx="4" fill="#1D9E75"/>
<rect x="422" y="81" width="28" height="32" rx="4" fill="#1D9E75"/>
<rect x="456" y="81" width="28" height="32" rx="4" fill="#1D9E75"/>
<rect x="490" y="81" width="28" height="32" rx="4" fill="#1D9E75"/>
<rect x="524" y="81" width="28" height="32" rx="4" fill="#1D9E75"/>
<rect x="558" y="81" width="28" height="32" rx="4" fill="#1D9E75"/>
<text class="lblm" x="266" y="128" text-anchor="middle">0</text>
<text class="lblm" x="300" y="128" text-anchor="middle">1</text>
<text class="lblm" x="334" y="128" text-anchor="middle">2</text>
<text class="lblm" x="368" y="128" text-anchor="middle">3</text>
<text class="lblm" x="402" y="128" text-anchor="middle">4</text>
<text class="lblm" x="436" y="128" text-anchor="middle">5</text>
<text class="lblm" x="470" y="128" text-anchor="middle">6</text>
<text class="lblm" x="504" y="128" text-anchor="middle">7</text>
<text class="lblm" x="538" y="128" text-anchor="middle">8</text>
<text class="lblm" x="572" y="128" text-anchor="middle">9</text>
<text class="lbl" x="419" y="156" text-anchor="middle">패치 임베딩 + 위치 임베딩 (0 = 클래스 토큰)</text>
<rect x="250" y="176" width="12" height="12" rx="2" fill="#1D9E75"/><text class="lblm" x="268" y="186">패치 토큰</text>
<rect x="360" y="176" width="12" height="12" rx="2" fill="#D85A30"/><text class="lblm" x="378" y="186">클래스 토큰 (cls)</text>
</svg>
